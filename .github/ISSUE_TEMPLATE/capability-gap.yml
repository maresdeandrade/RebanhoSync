
---

## `.github/ISSUE_TEMPLATE/capability-gap.yml`

```yaml
name: Capability Gap / Tech Debt
description: Registrar gap ligado a capability_id do Catalog ou infra.* out-of-catalog
title: "[<capability_id>] <resumo curto>"
labels: ["capability", "tech-debt"]
body:
  - type: markdown
    attributes:
      value: |
        Use este template para gaps rastreáveis de capacidade, infraestrutura ou governança.
        
        Regras:
        - Use `capability_id` para itens do Catalog.
        - Use `infra.*` para itens fora do catálogo funcional.
        - Inclua evidência PM sempre que possível.
        - Critério de aceite deve ser mensurável.

  - type: input
    id: capability_id
    attributes:
      label: capability_id ou infra_id
      description: Ex.: movimentacao.anti_teleport_client, pesagem.registro, infra.rbac_hardening
      placeholder: "movimentacao.anti_teleport_client"
    validations:
      required: true

  - type: dropdown
    id: track
    attributes:
      label: Track
      options:
        - Catalog
        - Infra (Out-of-catalog)
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severidade
      description: P0 bloqueia operação/segurança; P1 degrada fluxo crítico; P2 é dívida ou melhoria relevante.
      options:
        - P0
        - P1
        - P2
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domínio principal
      options:
        - sanitario
        - pesagem
        - nutricao
        - movimentacao
        - reproducao
        - financeiro
        - agenda
        - insights
        - sync
        - security
        - platform
        - docs
    validations:
      required: true

  - type: checkboxes
    id: affected_layers
    attributes:
      label: Camadas afetadas
      options:
        - label: UI / UX
        - label: Domínio / regra de negócio
        - label: Dexie / offline local
        - label: Supabase / SQL / migrations
        - label: RLS / RPC / Edge Functions
        - label: Sync / queue / rollback
        - label: Testes
        - label: Docs derivados
        - label: CI / governança

  - type: textarea
    id: current_behavior
    attributes:
      label: Comportamento atual
      description: Descreva o que ocorre hoje. Evite solução aqui.
      placeholder: |
        Hoje o sistema permite origem == destino na movimentação, gerando rejeição tardia no fluxo de sync.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Comportamento esperado
      description: Descreva o resultado correto esperado.
      placeholder: |
        A UI deve impedir origem == destino antes da criação do gesto.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidência PM / P
      description: Inclua paths + linhas aproximadas (PM) e comandos reproduzíveis (P).
      placeholder: |
        PM: src/pages/Registrar.tsx:~L1066 — não bloqueia origem == destino
        P: rg -n "toLote|fromLote|origem|destino" src/pages/Registrar.tsx src
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Risco / Impacto
      placeholder: |
        - UX degradada
        - Rejeições no sync
        - Integridade operacional dependente apenas do servidor
        - Potencial divergência entre UI otimista e estado reconciliado
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Critério de aceite mensurável
      description: Deve permitir fechar o gap em IMPLEMENTATION_STATUS, TECH_DEBT e/ou ROADMAP.
      placeholder: |
        - UI impede origem == destino
        - Teste cobre tentativa inválida
        - E2E Fluxo 3 passa sem depender de rejeição server-side
        - Docs derivados atualizados quando aplicável
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: Plano mínimo de teste
      placeholder: |
        - pnpm run lint
        - pnpm test
        - pnpm run build
        - Teste específico: pnpm exec vitest run <arquivo>
    validations:
      required: true

  - type: textarea
    id: docs_impact
    attributes:
      label: Impacto em documentação derivada
      description: Informe se exige regen/atualização de IMPLEMENTATION_STATUS, TECH_DEBT, ROADMAP ou RECONCILIACAO_REPORT.
      placeholder: |
        - IMPLEMENTATION_STATUS: sim/não
        - TECH_DEBT: sim/não
        - ROADMAP: sim/não
        - RECONCILIACAO_REPORT: sim/não
        - Baseline esperado: <hash ou pendente>
    validations:
      required: true

  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      description: Lista opcional de capability_id ou infra_id que precisam ser resolvidos antes.
      placeholder: |
        - movimentacao.registro
        - infra.sync_contract_audit
    validations:
      required: false

  - type: textarea
    id: rollback
    attributes:
      label: Rollback / mitigação
      placeholder: |
        - Reverter PR
        - Desabilitar CTA/fluxo afetado
        - Restaurar migration anterior, se aplicável
    validations:
      required: false