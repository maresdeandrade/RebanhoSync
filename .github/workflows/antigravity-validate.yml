name: antigravity-validate

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: antigravity-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # Garante que as JavaScript actions já rodem no runtime Node 24.
  # Mantém o Node do projeto controlado em actions/setup-node abaixo.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      CI: true
      VITE_SUPABASE_URL: ${{ vars.CI_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.CI_SUPABASE_ANON_KEY || 'example-anon-key' }}
      VITE_SUPABASE_FUNCTIONS_URL: ${{ vars.CI_SUPABASE_FUNCTIONS_URL || 'https://example.supabase.co/functions/v1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Detect changed files
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha || '' }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"

          if [[ -n "$BASE_SHA" ]]; then
            git diff --name-only "$BASE_SHA...$HEAD_SHA" > /tmp/changed-files.txt
          else
            git diff --name-only HEAD~1...HEAD > /tmp/changed-files.txt || true
          fi

          echo "Changed files:"
          sed 's/^/changed: /' /tmp/changed-files.txt

      - name: Header baseline consistency in derived docs
        run: |
          set -euo pipefail

          files=(
            "docs/IMPLEMENTATION_STATUS.md"
            "docs/TECH_DEBT.md"
            "docs/ROADMAP.md"
            "docs/review/RECONCILIACAO_REPORT.md"
          )

          any_changed=false

          for file in "${files[@]}"; do
            if grep -Fxq -- "$file" /tmp/changed-files.txt; then
              any_changed=true
              break
            fi
          done

          if [[ "$any_changed" == "false" ]]; then
            echo "No derived docs changed; skipping baseline header checks."
            exit 0
          fi

          extract_baseline() {
            local file="$1"
            local line=""
            local hash=""

            line="$(grep -Em1 '^(> )?\*\*Baseline:\*\* `[^`]+`$|^Baseline: .+$' "$file" || true)"

            if [[ -z "$line" ]]; then
              echo "Missing Baseline header in $file" >&2
              return 1
            fi

            hash="$(sed -nE 's/.*`([^`]+)`.*/\1/p' <<< "$line")"

            if [[ -z "$hash" ]]; then
              hash="$(sed -E 's/^>[[:space:]]*//; s/^\*\*Baseline:\*\*[[:space:]]*//; s/^Baseline:[[:space:]]*//; s/[[:space:]]+$//' <<< "$line")"
            fi

            if [[ -z "$hash" ]]; then
              echo "Could not extract Baseline value from $file" >&2
              return 1
            fi

            printf '%s\n' "$hash"
          }

          expected_baseline=""

          for file in "${files[@]}"; do
            if ! grep -Fxq -- "$file" /tmp/changed-files.txt; then
              continue
            fi

            baseline="$(extract_baseline "$file")"
            echo "$file baseline=$baseline"

            if [[ -z "$expected_baseline" ]]; then
              expected_baseline="$baseline"
            fi

            if [[ "$baseline" != "$expected_baseline" ]]; then
              echo "Baseline mismatch: expected=$expected_baseline got=$baseline in $file" >&2
              exit 1
            fi
          done

      - name: Derivation sanity in derived docs
        run: |
          set -euo pipefail

          require_contains() {
            local file="$1"
            local pattern="$2"

            if [[ ! -f "$file" ]]; then
              echo "Missing required derived doc: $file" >&2
              exit 1
            fi

            if ! grep -Enq "$pattern" "$file"; then
              echo "Missing required pattern '$pattern' in $file" >&2
              exit 1
            fi

            echo "OK: $file contains '$pattern'"
          }

          advisory_contains() {
            local file="$1"
            local pattern="$2"

            if [[ ! -f "$file" ]]; then
              echo "Advisory skipped; file not found: $file"
              return 0
            fi

            echo "Advisory check: $file / $pattern"
            grep -En "$pattern" "$file" || true
          }

          require_contains "docs/IMPLEMENTATION_STATUS.md" "capability_id"
          require_contains "docs/TECH_DEBT.md" "capability_id"
          require_contains "docs/ROADMAP.md" "capability_id"

          advisory_contains "docs/IMPLEMENTATION_STATUS.md" "gap_set|gap\.capability_id"
          advisory_contains "docs/review/RECONCILIACAO_REPORT.md" "Match: ✅"

      - name: Repository must remain clean
        run: |
          set -euo pipefail

          echo "Git status:"
          git status -sb

          if [[ -n "$(git status --porcelain=v1)" ]]; then
            echo "Repository is dirty after validation. Generated or modified files must be committed." >&2
            git status --porcelain=v1
            exit 1
          fi
